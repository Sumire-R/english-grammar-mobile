<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#073676">
  <meta name="description" content="英会話のための基本文法ハンドブック - スマートフォン版">
  <title>基本文法ハンドブック | スマホ版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#cover" aria-label="基本文法ハンドブックの表紙へ">
      <span aria-hidden="true">▤</span><span>基本文法ハンドブック</span>
    </a>
    <button class="menu-button" type="button" aria-expanded="false" aria-controls="site-nav">
      <span class="sr-only">メニューを開く</span>
      <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
    </button>
    <nav id="site-nav" class="site-nav" aria-label="ページメニュー">
      <a href="#cover">表紙</a><a href="#contents">目次</a>
    </nav>
  </header>

  <main>
    <section id="cover" class="cover-section page-section" aria-labelledby="cover-title">
      <div class="intro">
        <p class="eyebrow">SMARTPHONE EDITION</p>
        <h1 id="cover-title">英会話のための<br>基本文法ハンドブック</h1>
        <p>「知る」から「話せる」へ。<br>全教材を、1テーマずつ大きく見られるスマートフォン版です。</p>
        <a class="primary-link" href="#contents">目次を見る <span aria-hidden="true">↓</span></a>
      </div>
      <button class="image-button cover-image" type="button" data-image="assets/cover.jpg" data-alt="英会話のための基本文法ハンドブック 表紙">
        <img src="assets/cover.jpg" alt="英会話のための基本文法ハンドブック 表紙" width="1490" height="2105">
        <span class="zoom-label">タップして拡大</span>
      </button>
    </section>

    <section id="contents" class="contents-section page-section" aria-labelledby="contents-title">
      <div class="section-heading">
        <p class="eyebrow">CONTENTS</p>
        <h2 id="contents-title">目次</h2>
        <p>学びたい項目をタップしてください。PDFの掲載順に並んでいます。</p>
      </div>
      <ol id="contents-list" class="contents-list"></ol>
      <div class="page-nav page-nav-single"><a href="#cover">前へ：表紙</a></div>
    </section>

    <div id="lessons"></div>
  </main>

  <footer>© 2026 Sumire &amp; Ryan</footer>

  <dialog class="lightbox" aria-label="教材画像の拡大表示">
    <button class="close-button" type="button" aria-label="拡大表示を閉じる">×</button>
    <div class="lightbox-scroll"><img src="" alt=""></div>
    <p>指で上下左右に動かして確認できます</p>
  </dialog>
  <script src="script.js"></script>
</body>
</html>
